<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e6c3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a73e8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#grad)" stroke-width="2" filter="url(#glow)"/>
  <path d="M50 15 Q70 25 65 50 Q60 70 50 85 Q40 70 35 50 Q30 25 50 15" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.6"/>
  <path d="M30 40 Q50 45 70 40" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.4"/>
  <path d="M25 55 Q50 60 75 55" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="50" cy="50" r="8" fill="url(#grad)" filter="url(#glow)">
    <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="35" cy="35" r="3" fill="#00e6c3" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="65" cy="35" r="3" fill="#1a73e8" opacity="0.8">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="35" cy="65" r="3" fill="#1a73e8" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="65" cy="65" r="3" fill="#00e6c3" opacity="0.8">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.8s" repeatCount="indefinite"/>
  </circle>
</svg>
